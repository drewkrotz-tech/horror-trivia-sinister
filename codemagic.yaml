workflows:
  ios-unsigned-build:
    name: iOS Unsigned Build (Pre-signing Smoke Test)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      node: 22
      xcode: 26.2
      cocoapods: default
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci
      - name: Build web app (Vite)
        script: |
          npm run build
      - name: Add iOS platform (Capacitor)
        script: |
          npx cap add ios
      - name: Sync Capacitor to iOS
        script: |
          npx cap sync ios
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install
      - name: Build unsigned .app for simulator (smoke test)
        script: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - ios/App/build/Build/Products/**/*.app
      - ios/App/build/**/*.dSYM.zip
    publishing:
      email:
        recipients:
          - drewkrotz@gmail.com
        notify:
          success: true
          failure: true
